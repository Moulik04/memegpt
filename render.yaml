services:
  - type: web
    name: memegpt-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile   # Dockerfile lives in backend/, not root
    dockerContext: .                        # build context = project root (Dockerfile does COPY backend/)
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false          # set this manually in Render dashboard → Environment
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "true"
